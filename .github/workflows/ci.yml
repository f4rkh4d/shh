name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup php
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_sqlite, sqlite3, curl
          coverage: none
          tools: composer:v2
      - name: composer install
        run: composer install --no-interaction --prefer-dist
      - name: phpunit
        run: vendor/bin/phpunit
